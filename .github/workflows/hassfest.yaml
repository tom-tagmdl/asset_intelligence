name: Validate with hassfest
run-name: Hassfest Validate - ${{ github.event_name == 'push' && github.event.head_commit.message || github.ref_name }}
on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * *"
jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v3"
      - name: Prepare integration layout for hassfest
        run: |
          mkdir -p custom_components/asset_intelligence
          rsync -a --delete --remove-source-files --prune-empty-dirs \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'custom_components/' \
            ./ custom_components/asset_intelligence/
      - uses: home-assistant/actions/hassfest@master
